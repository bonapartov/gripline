{% extends "coderedcms/pages/web_page.html" %}
{% load static %}

{% block content %}
<style>
    .force-width-1500 {
        max-width: 1500px !important;
        margin-left: auto !important;
        margin-right: auto !important;
        padding-left: 1rem !important;
        padding-right: 1rem !important;
    }

    .pending-container {
        max-width: 600px;
        margin: 3rem auto;
        padding: 2rem;
        background-color: #1a1a25;
        border: 1px solid #2a2a35;
        border-radius: 8px;
        text-align: center;
    }

    .pending-title {
        color: #ffc107;
        text-align: center;
        margin-bottom: 2rem;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 2rem;
    }

    .pending-icon {
        font-size: 4rem;
        color: #ffc107;
        margin-bottom: 1.5rem;
    }

    .pending-message {
        color: #ffffff;
        font-size: 1.2rem;
        margin-bottom: 1rem;
        line-height: 1.6;
    }

    .pending-info {
        color: #adb5bd;
        margin-bottom: 2rem;
        padding: 1rem;
        background-color: #15151c;
        border-radius: 8px;
        border: 1px solid #2a2a35;
    }

    .pending-info i {
        color: #0dcaf0;
        margin-right: 0.5rem;
    }

    .btn-pending {
        background-color: #ffc107;
        color: #000;
        border: none;
        padding: 0.75rem 2rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        text-decoration: none;
        display: inline-block;
    }

    .btn-pending:hover {
        background-color: #e0a800;
        transform: translateY(-2px);
        color: #000;
        text-decoration: none;
    }

    .btn-outline-warning {
        background-color: transparent;
        color: #ffc107;
        border: 1px solid #ffc107;
        padding: 0.75rem 2rem;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        text-decoration: none;
        display: inline-block;
        margin-top: 1rem;
    }

    .btn-outline-warning:hover {
        background-color: #ffc107;
        color: #000;
        text-decoration: none;
    }

    .status-badge {
        display: inline-block;
        background-color: #ffc107;
        color: #000;
        padding: 0.5rem 1.5rem;
        border-radius: 50px;
        font-weight: bold;
        margin-bottom: 1.5rem;
    }
</style>

<div class="force-width-1500 my-5">
    <div class="pending-container">
        <div class="pending-icon">⏳</div>
        <h1 class="pending-title">Заявка на рассмотрении</h1>

        <div class="status-badge">Ожидает подтверждения</div>

        <div class="pending-message">
            Ваша заявка отправлена администратору
        </div>

        <div class="pending-info">
            <i class="fas fa-clock"></i> Обычно это занимает 1-2 дня
        </div>

        <div class="pending-info">
            <i class="fas fa-envelope"></i> Вы получите уведомление на email
        </div>

        <a href="{% url 'accounts:logout' %}" class="btn-pending">Выйти</a>
        <a href="/" class="btn-outline-warning">На главную</a>
    </div>
</div>
{% endblock %}
